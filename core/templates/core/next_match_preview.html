<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sweepstake 2026 — Next match preview</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Georgia, 'Times New Roman', serif;
            background: #0a0a0a;
            color: #f0ede6;
            padding: 2rem 1rem;
        }

        .page { max-width: 900px; margin: 0 auto; }

        .section-label {
            font-size: 11px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: #555;
            margin-bottom: 16px;
            font-family: -apple-system, sans-serif;
        }

        /* Featured match card */
        .next-match {
            background: #111;
            border: 1px solid #222;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 3rem;
        }
        .next-match-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 18px;
            border-bottom: 1px solid #1e1e1e;
            font-family: -apple-system, sans-serif;
            font-size: 11px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #666;
        }
        .next-match-status { display: flex; align-items: center; gap: 7px; }
        .live-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #c2554a;
            animation: live-pulse 1.6s ease-in-out infinite;
        }
        @keyframes live-pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.35; transform: scale(0.75); }
        }
        .next-match-body { display: flex; align-items: stretch; }
        .nm-team {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 32px 20px;
            min-height: 130px;
            overflow: hidden;
        }
        .nm-team-bg { position: absolute; inset: 0; }
        .nm-team-bg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.16;
            filter: saturate(0.7);
        }
        .nm-team-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(17,17,17,0.25), rgba(17,17,17,0.92));
        }
        .nm-team-content { position: relative; z-index: 1; }
        .nm-flag {
            width: 42px;
            height: auto;
            border-radius: 2px;
            margin-bottom: 12px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.45);
        }
        .nm-team-name { font-size: 19px; letter-spacing: 0.03em; }
        .nm-person {
            font-size: 11px;
            color: #888;
            margin-top: 6px;
            font-style: italic;
            font-family: -apple-system, sans-serif;
        }
        .nm-center {
            flex-shrink: 0;
            width: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-left: 1px solid #1e1e1e;
            border-right: 1px solid #1e1e1e;
            padding: 20px 10px;
        }
        .nm-score {
            font-size: 30px;
            font-weight: 500;
            letter-spacing: 0.02em;
            white-space: nowrap;
        }
        .nm-vs {
            font-size: 12px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: #3a3a3a;
            font-family: -apple-system, sans-serif;
        }
        @media (max-width: 600px) {
            .next-match-body { flex-direction: column; }
            .nm-center {
                width: 100%;
                border-left: none;
                border-right: none;
                border-top: 1px solid #1e1e1e;
                border-bottom: 1px solid #1e1e1e;
                padding: 12px;
            }
            .nm-team { padding: 28px 20px; }
        }
    </style>
</head>
<body>
<div class="page">

    <p class="section-label">Live match</p>
    <div class="next-match">
        <div class="next-match-meta">
            <span>14 Jun 19:00 &nbsp;·&nbsp; Group A</span>
            <span class="next-match-status"><span class="live-dot"></span>Live</span>
        </div>
        <div class="next-match-body">
            <div class="nm-team">
                <div class="nm-team-bg"><img src="https://flagcdn.com/w320/ar.png" alt=""></div>
                <div class="nm-team-content">
                    <img src="https://flagcdn.com/w320/ar.png" alt="Argentina flag" class="nm-flag">
                    <div class="nm-team-name">Argentina</div>
                    <div class="nm-person">Dave</div>
                </div>
            </div>
            <div class="nm-center">
                <div class="nm-score">2 – 1</div>
            </div>
            <div class="nm-team">
                <div class="nm-team-bg"><img src="https://flagcdn.com/w320/hr.png" alt=""></div>
                <div class="nm-team-content">
                    <img src="https://flagcdn.com/w320/hr.png" alt="Croatia flag" class="nm-flag">
                    <div class="nm-team-name">Croatia</div>
                    <div class="nm-person">Sarah</div>
                </div>
            </div>
        </div>
    </div>

    <p class="section-label">Next up</p>
    <div class="next-match">
        <div class="next-match-meta">
            <span>17 Jun 15:00 &nbsp;·&nbsp; Round of 16</span>
            <span class="next-match-status">Scheduled</span>
        </div>
        <div class="next-match-body">
            <div class="nm-team">
                <div class="nm-team-bg"><img src="https://flagcdn.com/w320/br.png" alt=""></div>
                <div class="nm-team-content">
                    <img src="https://flagcdn.com/w320/br.png" alt="Brazil flag" class="nm-flag">
                    <div class="nm-team-name">Brazil</div>
                    <div class="nm-person">Priya</div>
                </div>
            </div>
            <div class="nm-center">
                <div class="nm-vs">vs</div>
            </div>
            <div class="nm-team">
                <div class="nm-team-bg"><img src="https://flagcdn.com/w320/fr.png" alt=""></div>
                <div class="nm-team-content">
                    <img src="https://flagcdn.com/w320/fr.png" alt="France flag" class="nm-flag">
                    <div class="nm-team-name">France</div>
                    <div class="nm-person">Tom</div>
                </div>
            </div>
        </div>
    </div>

</div>
</body>
</html>
